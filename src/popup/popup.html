<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kick Cleaner</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup popup--minimal">
    <header class="header">
      <div class="header-brand">
        <img src="../../icons/logo.svg" alt="" class="logo" width="36" height="36">
        <div class="header-text">
          <h1 class="title">Kick Cleaner</h1>
          <span class="version" id="version">1.0.0</span>
        </div>
      </div>
    </header>
    <p class="popup-message">
      The panel appears in the <strong>top-right</strong> of Kick.com pages. Open <a href="https://kick.com" target="_blank" rel="noopener noreferrer">kick.com</a> to see extracted emails, links, and copy the current page URL.
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
